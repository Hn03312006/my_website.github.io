<!DOCTYPE html>
<html lang = "en">
<head>
    <title>Hong Nguyen</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <style>
        #image {border-radius: 50%; animation: pop_up 2s; width: 100px}
        .social {border-radius: 50%; width: 50px}
        body {background-image: url("https://wallpapers.com/images/high/electronic-circuit-schematic-background-9sitivru7pj8l99m.webp")}
        .text1 {font-size: 15px; overflow-wrap: anywhere; font-weight: bold}


        .option {justify-self: center; display: grid; grid-template-columns: auto auto auto auto; width: 90%;}
        .remain_opt {justify-self: center; display: grid; place-content: center; font-size: 12px; font-weight:bold; width: 20dvw;
                    background-color: white; border-radius:20px; height: 30px}
         #dropbtn  {
            background-color: white;}
         #dropdown {justify-self: center}
         #dropdown div {font-weight:bold; display: grid; place-content: center; width: 20dvw; border-radius:20px; height: 30px}
           #dropdown div:hover {text-decoration: underline; cursor: pointer}
         #myDropdown {background: lightgrey; opacity: 0; }
         #myDropdown:hover {background: grey}
        .option > .remain_opt:hover {text-decoration: underline; cursor: pointer}





        .content {  transform: translateX(160%); animation: unroll-content 1s forwards 2s}
        #body_content {display: grid; grid-template-rows: 50px 1fr 80px; min-height:97dvh}
        .title {margin: 0 auto; overflow: hidden; padding: 7px; background-color: white; border-radius: 20px}

           .horizontal img {place-self: center}
        .horizontal .content {place-self: center; padding: 6px}

        #title_content {display:grid; width: 100%; height: 100%; place-content: center; font-weight: bolder}
        #the_middle {display: flex; justify-content: center; align-items: flex-end; gap: 40px;}

        .horizontal {
                padding: 12px;
                width: 50%;
                margin: 0 auto;
                margin-top: 12px;

                overflow: hidden;
                background-color: white;
                border-radius: 20px;
                display: grid;}



         #body_line { margin: auto auto; width: 100%;}


        @media (min-width: 700px)
        {
             #dropbtn, .remain_opt { font-size: 13px; }
             #myDropdown {font-size: 11px}
            .title {
                width: 37%;
                font-size: 40px
            }
            .horizontal {
                height: 115px;
                grid-template-columns: 120px 1fr
            }

        }
        @media (max-width: 700px) {
            #dropbtn, .remain_opt  { font-size: 12px; }
             #myDropdown {font-size: 10px}
            .title {
                width: 58%;
                font-size: 34px
            }
            .horizontal{
                height: 300px;

                grid-template-rows: 1fr 1fr
            }



        }
        @keyframes dropdisap {
            from {
                opacity: 1
            }
            to {
                opacity: 0
            }
        }
        @keyframes drop-down {
            from {

                opacity: 0
            }
            to {
                opacity: 1
            }
        }
        @keyframes disappear {
            from {

                transform: scale(1)
            }
            to {

                transform: scale(0)

            }
        }
        @keyframes pop_up {
            from {
                transform: scale(0);

            }
            to {transform: scale(1);
            }
        }
        @keyframes unroll-content {
            from {
                transform: translateX(160%);

            }
            to {
                transform: translateX(0);

            }
        }
        @keyframes slide_out {
            from {
                transform: translateX(0)

            }
            to {
                transform: translateX(104%)
            }
        }
    </style>

</head>
<body>


             <div id = "body_content">


             <div class = 'option' id = "o1">
        <div class = "remain_opt" onclick = "myFunction('0')">ABOUT ME</div>
        <div class = "remain_opt"  onclick = "myFunction('1')">SKILL</div>
        <div id = "ed" class = "remain_opt" onclick = "myFunction('2')"  >EDUCATION</div>
        <div id="dropdown">
  <div id="dropbtn">PROJECT</div>
  <div id="myDropdown" class="dropdown-content">
    2048 MUKBANG
  </div>
</div>
    </div>

                 <div id = "body_line">
            <div class="title"> <div class = "content" id = "title_content"> ABOUT ME </div> </div>
        <div class = "horizontal">


                    <img src = "me.jpg" id = "image">
                    <div class = "content">
                        <p class = "text1"> I am Hong, a computer Science student at UCI.
                    I am interested in enhancing more programming skill.
                    And investigating about machine learning.
                        </p>
                    </div>
        </div>
                </div>


                     <div id = "the_middle">
                         <a href="mailto:ngocnguyen110816@gmail.com"> <img src = "google.webp" class = "social">
                         </a>
                        <a href="https://github.com/Hn03312006"> <img src = "github.png" class = "social">
                         </a>
                           <a href="https://www.linkedin.com/in/hong-nguyen-67a245253">
                         <img src = "linkedin.jpg" class = "social">
                           </a>
                         </div>


             </div>



</body>

<script>
    let content = {'2': ["EDUCATION", "University_of_California,_Irvine_seal.svg.png", "<p class = 'text1'>Degree: Bachelor of Science in Computer Science (expected 2028)<br>GPA: 4.0<br>Award: Dean's Honor List<br>Scholarship: Regent's Scholar </p>"],
                    '1': ["SKILL", "skill.png", " <p class = 'text1'> Language: Python <br> Front-End: HTML, CSS, JavaScript <br>Database: SQLite</p>"],
                    '0': ["ABOUT ME", "me.jpg", '<p class="text1"> I am Hong, a computer Science student at UCI. I am interested in enhancing more programming skill. And investigating about machine learning.</p>'],
    }

    function myFunction(id) {
        let image = document.getElementById("image")
        image.style.animation = "disappear 0.5s forwards"
        const list_of_content = document.getElementsByClassName("content")

        image.addEventListener("animationend", () => {
                image.src = content[id][1]
                 list_of_content[0].style.animation = "slide_out 0.5s"
                list_of_content[1].style.animation = "slide_out 0.5s"
            }, {once: true})

        list_of_content[0].addEventListener("animationend", () => {
            image.style.animation = "pop_up 2s"
            list_of_content[0].innerHTML = content[id][0]
            list_of_content[0].style.animation=  'unroll-content 1s forwards 2s'
        }, {once: true})
        list_of_content[1].addEventListener("animationend", () => {
            list_of_content[1].innerHTML = content[id][2]
            list_of_content[1].style.animation = 'unroll-content 1s forwards 2s'
        }, {once: true})
            list_of_content[1].addEventListener("animationend", () => {console.log(document.getElementsByClassName("horizontal")[0].style.height)})
    }
    function drop_down_motion() {
        document.getElementById("myDropdown").style.animation = "drop-down 0s forwards"

    }
    function drop_disappear() {
        document.getElementById("myDropdown").style.animation = "drop_disap 0s forwards"

    }
    document.getElementById("dropdown").addEventListener("mouseenter", drop_down_motion)
    document.getElementById("dropdown").addEventListener("mouseleave", drop_disappear)

</script>
</html>
